document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

br>\n      <div style=\"padding-left: 20px; color: #3A3A38;\">/* Footer */<\u002Fdiv>\n      <div style=\"padding-left: 20px;\"><span style=\"color: #7AACF5;\">.footer-cta<\u002Fspan>    { <span style=\"color: #D8C870;\">flex-direction<\u002Fspan>: column; }<\u002Fdiv>\n      <div style=\"padding-left: 20px;\"><span style=\"color: #7AACF5;\">.footer-grid<\u002Fspan>   { <span style=\"color: #D8C870;\">grid-template-columns<\u002Fspan>: <span style=\"color: #8CC060;\">1fr<\u002Fspan>; }<\u002Fdiv>\n      <div style=\"padding-left: 20px;\"><span style=\"color: #7AACF5;\">.brand-mark<\u002Fspan>    { <span style=\"color: #D8C870;\">font-size<\u002Fspan>: <span style=\"color: #8CC060;\">72px<\u002Fspan>; }<\u002Fdiv>\n      <div>}<\u002Fdiv>\n      <br>\n      <div style=\"color: #3A3A38; margin-bottom: 4px;\">/* ── Tablet 768–1023px ───────────────────────── */<\u002Fdiv>\n      <div><span style=\"color: #1B4AE8;\">@media<\u002Fspan> (<span style=\"color: #D8C870;\">min-width<\u002Fspan>: <span style=\"color: #8CC060;\">768px<\u002Fspan>) and (<span style=\"color: #D8C870;\">max-width<\u002Fspan>: <span style=\"color: #8CC060;\">1023px<\u002Fspan>) {<\u002Fdiv>\n      <div style=\"padding-left: 20px;\"><span style=\"color: #7AACF5;\">:root<\u002Fspan> { <span style=\"color: #D8C870;\">--gutter<\u002Fspan>: <span style=\"color: #8CC060;\">32px<\u002Fspan>; }<\u002Fdiv>\n      <div style=\"padding-left: 20px;\"><span style=\"color: #7AACF5;\">.cards<\u002Fspan> { <span style=\"color: #D8C870;\">grid-template-columns<\u002Fspan>: <span style=\"color: #8CC060;\">1fr 1fr<\u002Fspan>; }<\u002Fdiv>\n      <div>}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ══ CODE SETUP ══ -->\n  <section data-mob=\"section\" id=\"code\" style=\"padding: 80px 56px; background: #FFFFFF;\">\n    <p style=\"font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.22em; color: #8A8882; text-transform: uppercase; margin-bottom: 52px;\">05 — Code Boilerplate<\u002Fp>\n\n    <h2 style=\"font-family: 'Barlow Condensed', sans-serif; font-size: 34px; font-weight: 800; text-transform: uppercase; margin-bottom: 24px;\">CSS Setup<\u002Fh2>\n    <div data-mob=\"code\" style=\"background: #080806; border: 1px solid #D8D5D0; padding: 32px 36px; font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.85; margin-bottom: 48px; overflow-x: auto;\">\n      <div style=\"color: #6A6A60; margin-bottom: 4px;\">/* ── fonts ───────────────────────────────────── */<\u002Fdiv>\n      <div><span style=\"color: #1B4AE8;\">@import<\u002Fspan> <span style=\"color: #8CC060;\">url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&amp;family=Barlow:wght@300;400;500;600&amp;display=swap')<\u002Fspan>;<\u002Fdiv>\n      <br>\n      <div style=\"color: #6A6A60; margin-bottom: 4px;\">/* ── tokens ──────────────────────────────────── */<\u002Fdiv>\n      <div><span style=\"color: #7AACF5;\">:root<\u002Fspan> {<\u002Fdiv>\n      <div style=\"padding-left: 20px;\"><span style=\"color: #D8C870;\">--c-black<\u002Fspan>:  <span style=\"color: #8CC060;\">#0D0D0B<\u002Fspan>;<\u002Fdiv>\n      <div style=\"padding-left: 20px;\"><span style=\"color: #D8C870;\">--c-white<\u002Fspan>:  <span style=\"color: #8CC060;\">#FFFFFF<\u002Fspan>;<\u002Fdiv>\n      <div style=\"padding-left: 20px;\"><span style=\"color: #D8C870;\">--c-accent<\u002Fspan>: <span style=\"color: #8CC060;\">#1B4AE8<\u002Fspan>; <span style=\"color: #6A6A60;\">/* blue — CTA only */<\u002Fspan><\u002Fdiv>\n      <div style=\"padding-left: 20px;\"><span style=\"color: #D8C870;\">--c-gray<\u002Fspan>:   <span style=\"color: #8CC060;\">#8A8882<\u002Fspan>;<\u002Fdiv>\n      <div style=\"padding-left: 20px;\"><span style=\"color: #D8C870;\">--c-border<\u002Fspan>: <span style=\"color: #8CC060;\">#D8D5D0<\u002Fspan>;<\u002Fdiv>\n      <div style=\"padding-left: 20px;\"><span style=\"color: #D8C870;\">--f-display<\u002Fspan>: <span style=\"color: #8CC060;\">'Barlow Condensed', sans-serif<\u002Fspan>;<\u002Fdiv>\n      <div style=\"padding-left: 20px;\"><span style=\"color: #D8C870;\">--f-body<\u002Fspan>:    <span style=\"color: #8CC060;\">'Barlow', sans-serif<\u002Fspan>;<\u002Fdiv>\n      <div style=\"padding-left: 20px;\"><span style=\"color: #D8C870;\">--gutter<\u002Fspan>:   <span style=\"color: #8CC060;\">56px<\u002Fspan>; <span style=\"color: #6A6A60;\">/* 32px tablet, 20px mobile */<\u002Fspan><\u002Fdiv>\n      <div>}<\u002Fdiv>\n      <br>\n      <div style=\"color: #6A6A60; margin-bottom: 4px;\">/* ── reset ───────────────────────────────────── */<\u002Fdiv>\n      <div><span style=\"color: #7AACF5;\">*, *::before, *::after<\u002Fspan> { <span style=\"color: #D8C870;\">box-sizing<\u002Fspan>: border-box; }<\u002Fdiv>\n      <div><span style=\"color: #7AACF5;\">body<\u002Fspan> { <span style=\"color: #D8C870;\">margin<\u002Fspan>: 0; <span style=\"color: #D8C870;\">font-family<\u002Fspan>: var(--f-body); <span style=\"color: #D8C870;\">font-size<\u002Fspan>: 16px; <span style=\"color: #D8C870;\">-webkit-font-smoothing<\u002Fspan>: antialiased; }<\u002Fdiv>\n      <div><span style=\"color: #7AACF5;\">img<\u002Fspan> { <span style=\"color: #D8C870;\">filter<\u002Fspan>: grayscale(<span style=\"color: #8CC060;\">100%<\u002Fspan>); <span style=\"color: #D8C870;\">display<\u002Fspan>: block; <span style=\"color: #D8C870;\">width<\u002Fspan>: 100%; }<\u002Fdiv>\n      <div><span style=\"color: #7AACF5;\">h1,h2,h3,h4<\u002Fspan> { <span style=\"color: #D8C870;\">font-family<\u002Fspan>: var(--f-display); <span style=\"color: #D8C870;\">text-transform<\u002Fspan>: uppercase; <span style=\"color: #D8C870;\">margin<\u002Fspan>: 0; }<\u002Fdiv>\n    <\u002Fdiv>\n\n    <h2 style=\"font-family: 'Barlow Condensed', sans-serif; font-size: 34px; font-weight: 800; text-transform: uppercase; margin-bottom: 24px;\">Classes Reference<\u002Fh2>\n    <div data-mob=\"code\" style=\"background: #080806; border: 1px solid #D8D5D0; padding: 32px 36px; font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.85; margin-bottom: 48px; overflow-x: auto;\">\n      <div style=\"color: #6A6A60; margin-bottom: 4px;\">/* Typography */<\u002Fdiv>\n      <div><span style=\"color: #7AACF5;\">.h1<\u002Fspan>  { <span style=\"color: #D8C870;\">font-size<\u002Fspan>: clamp(<span style=\"color: #8CC060;\">36px<\u002Fspan>,<span style=\"color: #8CC060;\">6vw<\u002Fspan>,<span style=\"color: #8CC060;\">88px<\u002Fspan>); <span style=\"color: #D8C870;\">font-weight<\u002Fspan>: 800; <span style=\"color: #D8C870;\">line-height<\u002Fspan>: 0.92; <span style=\"color: #D8C870;\">letter-spacing<\u002Fspan>: -0.02em; }<\u002Fdiv>\n      <div><span style=\"color: #7AACF5;\">.h2<\u002Fspan>  { <span style=\"color: #D8C870;\">font-size<\u002Fspan>: clamp(<span style=\"color: #8CC060;\">28px<\u002Fspan>,<span style=\"color: #8CC060;\">4vw<\u002Fspan>,<span style=\"color: #8CC060;\">56px<\u002Fspan>); <span style=\"color: #D8C870;\">font-weight<\u002Fspan>: 800; <span style=\"color: #D8C870;\">line-height<\u002Fspan>: 0.93; }<\u002Fdiv>\n      <div><span style=\"color: #7AACF5;\">.label<\u002Fspan> { <span style=\"color: #D8C870;\">font-family<\u002Fspan>: var(--f-display); <span style=\"color: #D8C870;\">font-size<\u002Fspan>: 11px; <span style=\"color: #D8C870;\">font-weight<\u002Fspan>: 700; <span style=\"color: #D8C870;\">letter-spacing<\u002Fspan>: 0.22em; <span style=\"color: #D8C870;\">color<\u002Fspan>: var(--c-accent); <span style=\"color: #D8C870;\">text-transform<\u002Fspan>: uppercase; }<\u002Fdiv>\n      <br>\n      <div style=\"color: #6A6A60; margin-bottom: 4px;\">/* Buttons */<\u002Fdiv>\n      <div><span style=\"color: #7AACF5;\">.btn<\u002Fspan>          { <span style=\"color: #D8C870;\">font-family<\u002Fspan>: var(--f-display); <span style=\"color: #D8C870;\">font-size<\u002Fspan>: 13px; <span style=\"color: #D8C870;\">font-weight<\u002Fspan>: 700; <span style=\"color: #D8C870;\">letter-spacing<\u002Fspan>: 0.12em; <span style=\"color: #D8C870;\">text-transform<\u002Fspan>: uppercase; <span style=\"color: #D8C870;\">padding<\u002Fspan>: 14px 28px; <span style=\"color: #D8C870;\">border<\u002Fspan>: none; <span style=\"color: #D8C870;\">cursor<\u002Fspan>: pointer; }<\u002Fdiv>\n      <div><span style=\"color: #7AACF5;\">.btn-primary<\u002Fspan>  { <span style=\"color: #D8C870;\">background<\u002Fspan>: var(--c-accent); <span style=\"color: #D8C870;\">color<\u002Fspan>: #fff; }<\u002Fdiv>\n      <div><span style=\"color: #7AACF5;\">.btn-outline<\u002Fspan>  { <span style=\"color: #D8C870;\">background<\u002Fspan>: transparent; <span style=\"color: #D8C870;\">border<\u002Fspan>: 1px solid #3A3A38; <span style=\"color: #D8C870;\">color<\u002Fspan>: var(--c-white); }<\u002Fdiv>\n      <br>\n      <div style=\"color: #6A6A60; margin-bottom: 4px;\">/* Sections */<\u002Fdiv>\n      <div><span style=\"color: #7AACF5;\">.section<\u002Fspan>       { <span style=\"color: #D8C870;\">padding<\u002Fspan>: 80px var(--gutter); }<\u002Fdiv>\n      <div><span style=\"color: #7AACF5;\">.section--dark<\u002Fspan>  { <span style=\"color: #D8C870;\">background<\u002Fspan>: var(--c-black); <span style=\"color: #D8C870;\">color<\u002Fspan>: var(--c-white); }<\u002Fdiv>\n      <div><span style=\"color: #7AACF5;\">.section--accent<\u002Fspan>{ <span style=\"color: #D8C870;\">background<\u002Fspan>: var(--c-accent); <span style=\"color: #D8C870;\">color<\u002Fspan>: #fff; }<\u002Fdiv>\n      <br>\n      <div style=\"color: #6A6A60; margin-bottom: 4px;\">/* Grid */<\u002Fdiv>\n      <div><span style=\"color: #7AACF5;\">.split<\u002Fspan>   { <span style=\"color: #D8C870;\">display<\u002Fspan>: grid; <span style=\"color: #D8C870;\">grid-template-columns<\u002Fspan>: 1fr 1fr; }<\u002Fdiv>\n      <div><span style=\"color: #7AACF5;\">.cards<\u002Fspan>   { <span style=\"color: #D8C870;\">display<\u002Fspan>: grid; <span style=\"color: #D8C870;\">grid-template-columns<\u002Fspan>: repeat(3, 1fr); <span style=\"color: #D8C870;\">gap<\u002Fspan>: 3px; }<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Core Rules -->\n    <h2 style=\"font-family: 'Barlow Condensed', sans-serif; font-size: 34px; font-weight: 800; text-transform: uppercase; margin-bottom: 24px;\">Core Rules<\u002Fh2>\n    <div data-mob=\"rules-grid\" style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #D8D5D0; border: 1px solid #D8D5D0;\">\n      <div style=\"background: #FFFFFF; padding: 28px;\">\n        <div style=\"font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.18em; color: #1B4AE8; text-transform: uppercase; margin-bottom: 14px;\">Типографіка<\u002Fdiv>\n        <ul style=\"font-size: 13px; line-height: 1.9; color: #5A5A58; padding-left: 16px; list-style: disc;\">\n          <li>Усі заголовки — uppercase, Barlow Condensed 800<\u002Fli>\n          <li>H1/H2 line-height: 0.9–0.95, letter-spacing: -0.015em<\u002Fli>\n          <li>Тіло: Barlow 400, line-height: 1.68<\u002Fli>\n          <li>Мітки: 11px, 0.22em tracking, accent color<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div style=\"background: #FFFFFF; padding: 28px;\">\n        <div style=\"font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.18em; color: #1B4AE8; text-transform: uppercase; margin-bottom: 14px;\">Колір<\u002Fdiv>\n        <ul style=\"font-size: 13px; line-height: 1.9; color: #5A5A58; padding-left: 16px; list-style: disc;\">\n          <li>Blue (#1B4AE8) — тільки кнопки, маркери, логотип<\u002Fli>\n          <li>Секції чергуються: темна ↔ світла<\u002Fli>\n          <li>Без градієнтів — flat color<\u002Fli>\n          <li>Всі фото — filter: grayscale(100%)<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div style=\"background: #FFFFFF; padding: 28px;\">\n        <div style=\"font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.18em; color: #1B4AE8; text-transform: uppercase; margin-bottom: 14px;\">Сітка<\u002Fdiv>\n        <ul style=\"font-size: 13px; line-height: 1.9; color: #5A5A58; padding-left: 16px; list-style: disc;\">\n          <li>Desktop: гатер 56px, секції 80px<\u002Fli>\n          <li>Tablet: гатер 32px, секції 60px<\u002Fli>\n          <li>Mobile: гатер 20px, секції 52px<\u002Fli>\n          <li>border-radius: 0 скрізь<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div style=\"background: #FFFFFF; padding: 28px;\">\n        <div style=\"font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.18em; color: #1B4AE8; text-transform: uppercase; margin-bottom: 14px;\">Взаємодія<\u002Fdiv>\n        <ul style=\"font-size: 13px; line-height: 1.9; color: #5A5A58; padding-left: 16px; list-style: disc;\">\n          <li>Hover: background 0.2s ease<\u002Fli>\n          <li>Акордеон: max-height 0.35s ease<\u002Fli>\n          <li>Активний nav: border-bottom 1px #1B4AE8<\u002Fli>\n          <li>Scroll reveal: opacity + translateY 0.5s<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top: 72px; padding-top: 32px; border-top: 1px solid #D8D5D0; display: flex; justify-content: space-between; align-items: center;\">\n      <span style=\"font-family: 'Barlow Condensed', sans-serif; font-size: 44px; font-weight: 800; color: #1B4AE8; line-height: 1;\">G<\u002Fspan>\n      <span style=\"font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.2em; color: #8A8882; text-transform: uppercase;\">Design System v1.0 — Visual Identity Guidelines<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
