<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0033a0">
  <title>Asystent AI | BTC Consulting</title>

  <link rel="stylesheet" href="../Ua/industrial-modern.css">

  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; max-width: 100%; }
    textarea, input { font-size: 1rem !important; }
    *, *::before, *::after { box-sizing: border-box; }

    .chat-fullscreen {
      display: flex; flex-direction: column;
      height: 100%; height: 100dvh;
      background: var(--color-white);
    }

    .chat-fs-header {
      display: flex; align-items: center; gap: 1rem;
      flex-shrink: 0; padding: 0.9rem 1.25rem;
      background: var(--color-black); color: var(--color-white);
      border-bottom: 4px solid var(--color-blue);
    }
    .chat-fs-back {
      display: inline-flex; align-items: center; gap: 0.35rem;
      color: var(--color-white); text-decoration: none;
      font-weight: 800; text-transform: uppercase; font-size: 0.8rem;
      flex-shrink: 0;
    }
    .chat-fs-title { display: flex; align-items: center; gap: 0.75rem; }
    .chat-fs-spacer { flex: 1; }
    .chat-fs-name { font-weight: 800; text-transform: uppercase; font-size: 0.95rem; line-height: 1.2; }
    .chat-fs-status { font-size: 0.75rem; color: var(--color-blue); font-weight: 700; text-transform: uppercase; }

    .srp-chat-avatar {
      width: 34px; height: 34px; flex-shrink: 0;
      background: var(--color-blue); color: var(--color-white);
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 0.75rem; letter-spacing: 0.02em;
    }

    .chat-fs-msgs {
      flex: 1; overflow-y: auto; padding: 1.25rem;
      display: flex; flex-direction: column; gap: 1rem;
      background: var(--color-gray-light);
    }
    .srp-chat-msg { display: flex; align-items: flex-start; gap: 0.6rem; max-width: 85%; }
    .srp-chat-msg--bot { align-self: flex-start; }
    .srp-chat-msg--user { align-self: flex-end; flex-direction: row-reverse; }
    .srp-chat-bubble {
      padding: 0.75rem 1rem; font-size: 0.95rem; line-height: 1.55;
      background: var(--color-white); border: 2px solid var(--color-black);
      white-space: pre-wrap; word-break: break-word;
    }
    .srp-chat-msg--user .srp-chat-bubble {
      background: var(--color-black); color: var(--color-white); border-color: var(--color-black);
    }
    .srp-chat-bubble--typing::after {
      content: '▌'; display: inline-block; animation: blink 1s steps(1) infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .srp-chat-file-bar {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.5rem 1.25rem; background: var(--color-gray-light);
      border-top: 2px solid var(--color-black);
      font-size: 0.85rem; font-weight: 700;
    }
    .srp-chat-file-clear {
      background: none; border: none; cursor: pointer;
      font-size: 1.2rem; font-weight: 800; color: var(--color-black); line-height: 1;
    }

    .chat-fs-input-row {
      display: flex; align-items: flex-end; gap: 0.6rem;
      flex-shrink: 0; padding: 0.75rem 1rem;
      border-top: 4px solid var(--color-black); background: var(--color-white);
    }
    .srp-chat-attach {
      display: flex; align-items: center; justify-content: center;
      width: 40px; height: 40px; flex-shrink: 0;
      border: 2px solid var(--color-black); color: var(--color-black);
      cursor: pointer;
    }
    .srp-chat-textarea {
      flex: 1; resize: none; border: 2px solid var(--color-black);
      padding: 0.6rem 0.8rem; font-family: inherit; max-height: 140px;
      outline: none;
    }
    .srp-chat-textarea:focus { border-color: var(--color-blue); }
    .srp-chat-send {
      display: flex; align-items: center; justify-content: center;
      width: 44px; height: 44px; flex-shrink: 0;
      background: var(--color-blue); color: var(--color-white);
      border: none; cursor: pointer;
    }
    .srp-chat-send:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>

<div class="chat-fullscreen">

  <!-- Header -->
  <div class="chat-fs-header">
    <a href="kalkulator-roi.html#ai-agent" class="chat-fs-back">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Wróć
    </a>
    <div class="chat-fs-title">
      <div class="srp-chat-avatar" aria-hidden="true">AI</div>
      <div>
        <div class="chat-fs-name">Asystent AI</div>
        <div class="chat-fs-status">Konsultant online</div>
      </div>
    </div>
    <div class="chat-fs-spacer"></div>
  </div>

  <!-- Messages -->
  <div class="chat-fs-msgs srp-chat-msgs" id="srp-chat-msgs" role="log" aria-live="polite">
    <div class="srp-chat-msg srp-chat-msg--bot">
      <div class="srp-chat-avatar" aria-hidden="true">AI</div>
      <div class="srp-chat-bubble" id="srp-chat-welcome">Dzien dobry! Jestem konsultantem technicznym BTC Consulting. Prosze opowiedziec o swoim obiekcie: typ oczyszczalni, przyblizna wielkosc w RLM, jak aktualnie rozwiazujecie kwestie osadow. Mozna tez przeslac dokumentacje w formacie PDF lub XLSX.</div>
    </div>
  </div>

  <!-- File preview -->
  <div class="srp-chat-file-bar" id="srp-chat-file-bar" style="display:none">
    <span id="srp-chat-file-name"></span>
    <button class="srp-chat-file-clear" id="srp-chat-file-clear" aria-label="Remove file">&times;</button>
  </div>

  <!-- Input row -->
  <div class="srp-chat-input-row chat-fs-input-row" id="chat-input-row">
    <label class="srp-chat-attach" for="srp-chat-file" title="Dołącz plik (PDF, XLSX, DOCX)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
      <input type="file" id="srp-chat-file" accept=".pdf,.xlsx,.xls,.docx,.csv,.txt" style="display:none">
    </label>
    <textarea id="srp-chat-input" class="srp-chat-textarea" placeholder="Np.: Oczyszczalnia 150 000 RLM, osad wywozimy na składowisko za 350 PLN/t..." rows="1" maxlength="4000" autocomplete="off" autocorrect="off" spellcheck="false" autocapitalize="sentences"></textarea>
    <button class="srp-chat-send" id="srp-chat-send" aria-label="Wyślij">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>

</div><!-- /.chat-fullscreen -->

<script>
(function(){
  var AGENT_ENDPOINT = 'https://btc-agent.maksym-koval-vpl.workers.dev/chat';
  var DEMO_MODE = AGENT_ENDPOINT.indexOf('CHANGE_ME') !== -1;
  var history   = [];
  var pendingFile = null;
  var isStreaming = false;

  var msgsEl   = document.getElementById('srp-chat-msgs');
  var inputEl  = document.getElementById('srp-chat-input');
  var sendBtn  = document.getElementById('srp-chat-send');
  var fileEl   = document.getElementById('srp-chat-file');
  var fileBar  = document.getElementById('srp-chat-file-bar');
  var fileName = document.getElementById('srp-chat-file-name');
  var fileClear= document.getElementById('srp-chat-file-clear');

  inputEl.addEventListener('input', function(){
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 140) + 'px';
  });
  inputEl.addEventListener('keydown', function(e){
    if (e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); send(); }
  });
  fileEl.addEventListener('change', function(){
    var f = this.files[0];
    if (!f) return;
    if (f.size > 5 * 1024 * 1024) { alert('Plik > 5 MB'); return; }
    var reader = new FileReader();
    reader.onload = function(ev){
      pendingFile = { name: f.name, type: f.type, data: ev.target.result.split(',')[1] };
      fileName.textContent = f.name;
      fileBar.style.display = '';
    };
    reader.readAsDataURL(f);
  });
  fileClear.addEventListener('click', function(){
    pendingFile = null; fileBar.style.display = 'none'; fileEl.value = '';
  });
  sendBtn.addEventListener('click', send);

  function send() {
    if (isStreaming) return;
    var text = inputEl.value.trim();
    if (!text && !pendingFile) return;
    var msgText = text || ('(plik: ' + (pendingFile ? pendingFile.name : '') + ')');
    addMsg('user', msgText);
    history.push({ role: 'user', content: text || 'Przeanalizuj przesłany plik.' });
    inputEl.value = ''; inputEl.style.height = 'auto';
    var file = pendingFile;
    pendingFile = null; fileBar.style.display = 'none'; fileEl.value = '';
    if (DEMO_MODE) { simulateDemo(); return; }
    isStreaming = true; sendBtn.disabled = true;
    var botBubble = addMsg('bot', '', true);
    fetch(AGENT_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history, file: file }),
    })
    .then(function(resp){
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      var reader = resp.body.getReader();
      var dec = new TextDecoder();
      var buf = ''; var full = '';

      // Save conversation after each bot response
      function saveConversation() {
        if (typeof AGENT_ENDPOINT === 'undefined' || AGENT_ENDPOINT.indexOf('CHANGE_ME') !== -1) return;
        var endpoint = AGENT_ENDPOINT.replace('/chat', '/conv');
        var payload = {
          ts: Date.now(),
          session_id: typeof session_id !== 'undefined' ? session_id : 'unknown',
          lang: document.documentElement.lang || 'unknown',
          url: window.location.pathname,
          messages: history.slice()
        };
        fetch(endpoint, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify(payload)
        }).catch(function(){});
      }
      function pump(){
        return reader.read().then(function(r){
          if (r.done){ history.push({ role: 'assistant', content: full }); isStreaming = false; sendBtn.disabled = false; return; }
          buf += dec.decode(r.value, { stream: true });
          var lines = buf.split('\n'); buf = lines.pop();
          lines.forEach(function(line){
            if (!line.startsWith('data:')) return;
            var raw = line.slice(5).trim();
            if (raw === '[DONE]') return;
            try { var ev = JSON.parse(raw); if (ev.type === 'content_block_delta' && ev.delta && ev.delta.text){ full += ev.delta.text; botBubble.textContent = full; msgsEl.scrollTop = msgsEl.scrollHeight; } } catch(e){}
          });
          return pump();
        });
      }
      return pump();
    })
    .catch(function(err){
      botBubble.textContent = 'Błąd połączenia. Skontaktuj się: contact@biotc.pl';
      isStreaming = false; sendBtn.disabled = false;
    });
  }

  function simulateDemo(){
    var botBubble = addMsg('bot', '', true);
    var msg = 'Asystent AI podłączony! Aby aktywować, wdróż Cloudflare Worker i zamień AGENT_ENDPOINT. Na razie: contact@biotc.pl lub +48 608 003 458.';
    var i = 0;
    var iv = setInterval(function(){ botBubble.textContent = msg.slice(0,++i); msgsEl.scrollTop = msgsEl.scrollHeight; if(i>=msg.length){ clearInterval(iv); history.push({role:'assistant',content:msg}); }}, 18);
  }

  function addMsg(role, text, empty) {
    var wrap = document.createElement('div');
    wrap.className = 'srp-chat-msg srp-chat-msg--' + (role==='user'?'user':'bot');
    if (role === 'bot') { var av = document.createElement('div'); av.className = 'srp-chat-avatar'; av.setAttribute('aria-hidden','true'); av.textContent = 'AI'; wrap.appendChild(av); }
    var bubble = document.createElement('div');
    bubble.className = 'srp-chat-bubble' + (empty?' srp-chat-bubble--typing':'');
    if (!empty) bubble.textContent = text;
    wrap.appendChild(bubble);
    msgsEl.appendChild(wrap);
    msgsEl.scrollTop = msgsEl.scrollHeight;
    return bubble;
  }

  // Keyboard sticky
  if (window.visualViewport) {
    var keepVisible = function(){
      if (document.activeElement !== inputEl) return;
      inputEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      msgsEl.scrollTop = msgsEl.scrollHeight;
    };
    window.visualViewport.addEventListener('resize', keepVisible);
    inputEl.addEventListener('focus', function(){ setTimeout(keepVisible, 350); });
  }
})();
</script>
</body>
</html>
